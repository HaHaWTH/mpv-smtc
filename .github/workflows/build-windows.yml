name: Build mpv SMTC bridge

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - dev

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build x64 with MSVC
        shell: cmd
        run: |
          mkdir dist

          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64

          cl /std:c++20 /EHsc /O2 /W4 /DUNICODE /D_UNICODE ^
            src\mpv-smtc-bridge.cpp ^
            /Fe:dist\mpv-smtc-bridge.exe ^
            /link ^
            /SUBSYSTEM:WINDOWS ^
            /ENTRY:wmainCRTStartup ^
            windowsapp.lib user32.lib shell32.lib propsys.lib

      - name: Upload exe
        uses: actions/upload-artifact@v7
        with:
          name: mpv-smtc-bridge-windows-x64
          path: dist/mpv-smtc-bridge.exe